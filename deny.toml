# cargo-deny policy file. Run via `cargo deny check` (requires
# `cargo install cargo-deny` first — not enforced at compile time).
#
# This config is intentionally strict on advisories and sources;
# license-allowlist is permissive enough to cover the current dep tree
# without rejecting reasonable crates.

[graph]
all-features = true

[licenses]
# SPDX expressions accepted in the Cargo ecosystem.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",
  "0BSD",
  # webpki-root-certs ships the Mozilla CA set under this permissive data license.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
exceptions = []

# Aligned with clippy's `multiple_crate_versions = "allow"` in
# the workspace Cargo.toml: deep tokio/serde trees routinely ship
# multiple compatible versions; warning on them is noise, not signal.
[bans]
multiple-versions = "allow"
wildcards = "deny"
# Our internal crates depend on each other via unversioned `path =` entries,
# which cargo-deny counts as wildcards; that pattern is fine for a workspace.
allow-wildcard-paths = true
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[advisories]
# db-path defaults to $CARGO_HOME/advisory-db; don't set it here
# because cargo-deny does not shell-expand `~`.
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Only fail on unmaintained crates we depend on *directly*. Tauri's GTK Linux
# backend drags in ~17 unmaintained transitive crates we can't do anything about.
unmaintained = "workspace"
ignore = []
