name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      # rustfmt.toml carries nightly-only options; on the stable pin they are
      # ignored with warnings, which is fine — the check still runs.
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    # Tauri 2 needs webkit2gtk-4.1, which ships on 24.04.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Tauri Linux deps (the desktop crate links webkit)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - name: Clippy — core crates
        run: cargo clippy --workspace --exclude ordius-desktop --all-targets --features testing --locked -- -D warnings
      - name: Clippy — desktop (no frontend build)
        run: cargo clippy -p ordius-desktop --no-default-features --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      # Gated WSL/SSH e2e tests are #[ignore]d and do not run here.
      - run: cargo test --workspace --exclude ordius-desktop --features testing --locked

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Collect coverage (lcov)
        run: cargo llvm-cov --workspace --exclude ordius-desktop --features testing --locked --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
          # Public repos can upload tokenless; set CODECOV_TOKEN as a repo
          # secret if uploads get rate-limited.
          token: ${{ secrets.CODECOV_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master
